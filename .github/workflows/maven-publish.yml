name: Publish to Maven Repository

on:
  push:
    paths:
      - '**/gradle.properties'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GROUP_PATH: "net/msrandom"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: false

      - name: Checkout Maven Repo
        uses: actions/checkout@v6
        with:
          repository: SettingDust/maven
          token: ${{ secrets.MAVEN_REPO_TOKEN }}
          path: maven-repo

      - name: Build all modules
        uses: burrunan/gradle-cache-action@v3
        with:
          arguments: publishToMavenLocal

      - name: Copy artifacts to Maven repo
        run: |
          SOURCE="$HOME/.m2/repository/$GROUP_PATH"
          TARGET="maven-repo/repository/$GROUP_PATH"
          
          mkdir -p "$TARGET"
          
          if [ -d "$SOURCE" ]; then
            echo "Copying all published artifacts to maven repo..."
            cp -r "$SOURCE/"* "$TARGET/"
            
            # Remove local-only metadata files
            find "$TARGET" -name "maven-metadata-local.xml" -delete
            echo "Done."
          else
            echo "ERROR: Local repository not found at $SOURCE"
            exit 1
          fi

      - name: Commit and push
        working-directory: maven-repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add repository/
          
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            # List changed modules from git diff
            CHANGED=$(git diff --cached --name-only | grep "^repository/$GROUP_PATH/" | cut -d/ -f4 | sort -u | tr '\n' ' ' | xargs)
            echo "Changed modules: $CHANGED"
            
            MODULE_COUNT=$(echo "$CHANGED" | wc -w)
            if [ "$MODULE_COUNT" -eq 1 ]; then
              COMMIT_MSG="chore(release): publish $CHANGED"
            else
              BODY=$(echo "$CHANGED" | tr ' ' '\n' | sed 's/^/- /')
              COMMIT_MSG=$(printf "chore(release): publish %d modules\n\nChanged modules:\n%s" "$MODULE_COUNT" "$BODY")
            fi
            
            git commit -m "$COMMIT_MSG"
            git push
          fi
